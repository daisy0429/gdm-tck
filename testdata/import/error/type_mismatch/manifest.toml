graph = "error_type_mismatch"
space = "default"

[[vertices]]
path = "vertices.csv"
label = "Person"
id = ["id"]
properties = [
  { name = "id", type = "int" },
  { name = "name", type = "string" },
  { name = "age", type = "int" },
  { name = "score", type = "float" },
]

[[edges]]
path = "edges.csv"
label = "KNOWS"
src = { label = "Person", id = ["src"] }
dst = { label = "Person", id = ["dst"] }
properties = [
  { name = "since", type = "int" },
  { name = "weight", type = "float" },
]
