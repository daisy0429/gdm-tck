graph = "delimiter_semicolon"
space = "default"
delimiter = ";"

[[vertices]]
path = "vertices_semicolon.csv"
label = "SemicolonVertex"
id = ["id"]
properties = "*"

[[edges]]
path = "edges_semicolon.csv"
