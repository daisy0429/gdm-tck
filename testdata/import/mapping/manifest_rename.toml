graph = "mapping_rename"
space = "default"

[[vertices]]
path = "persons.csv"
label = "Person"
id = ["id"]
properties = [
  { name = "id", type = "int" },
  { name = "name", type = "string" },
  { column = "birth_year", name = "birthYear", type = "int" },
]

[[edges]]
path = "knows.csv"
label = "KNOWS"
src = { label = "Person", id = ["src"] }
dst = { label = "Person", id = ["dst"] }
properties = [
  { column = "weight_score", name = "weight", type = "float" },
]
