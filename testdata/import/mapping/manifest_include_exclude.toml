graph = "mapping_filter"
space = "default"

[[vertices]]
path = "persons.csv"
label = "Person"
id = ["id"]
properties = { include = "*", exclude = ["email"] }

[[edges]]
path = "knows.csv"
label = "KNOWS"
src = { label = "Person", id = ["src"] }
dst = { label = "Person", id = ["dst"] }
properties = { include = "*", exclude = ["weight_score"] }
