# GDM 完整配置示例
#
# 说明：
# - 本文件列出当前 TOML 配置入口支持的主要配置项。
# - 每个配置项前的注释说明用途；枚举值会列出全部可选值。
# - 带路径、证书、多节点 peer 的配置请按部署环境修改。
# - 单节点快速验证可直接使用 standalone + rocksdb；生产环境请启用 TLS、审计落盘、监控和备份策略。

# 端口规划: gRPC内部=9830, gRPC公开=9830, Bolt=7690, Metrics=9095



# 节点 ID。standalone 可省略，默认使用 1；distributed 必须显式配置，且必须存在于 [[cluster.peers]]。
node_id = 1

# 部署模式。枚举值：standalone、distributed。
mode = "standalone"

# 本节点 gRPC 监听地址。standalone 下同时作为客户端访问地址；distributed 下通常作为内部/Raft 地址。
listen_addr = "10.86.11.245:9830"

# 收到 SIGTERM/SIGINT 后等待任务和服务优雅退出的时间，单位：秒。
# by AI: 收到 SIGTERM/SIGINT 信号（如 kill 或 Ctrl+C）后，GDM 等待所有运行中的任务和服务（查询、gRPC、Bolt 等）优雅退出的最大秒数。默认30秒。
# 超时后强制终止进程。类似还有 shutdown_drain_secs（Bolt 会话排空等待5秒）和 flush_drain_secs（审计队列排空2秒）。
shutdown_grace_secs = 30

# 默认数据目录；[storage].data_dir 未设置时使用此路径。
data_dir = "./data"

# 存储引擎。枚举值：memory、rocksdb。
# memory 进程退出后数据丢失；rocksdb 为持久化存储。
engine = "rocksdb"

# 部署身份标识，用于避免同一 data_dir 被错误复用到不同部署。
# distributed 模式下如配置则不能为空；standalone 可不配置。
#by AI 典型场景：
#防数据损坏：你重建了集群（新 peers/新节点ID），但 data_dir 还是旧的。GDM 启动时比对 data_dir 内存储的 deployment_id 与配置值，不一致则拒绝启动，避免旧数据与新集群冲突。
#distributed 模式必填（不能为空）；standalone 可不配（启动日志显示为 -）
# deployment_id = "gdm-dev"


# ---- 集群拓扑 -------------------------------------------------------------

[cluster]
# 旧版兼容字段：保留解析，但当前 shard placement 不再依赖该字段。
partitions = [0]

# 初始 Meta Raft voter 集合。distributed 首次启动集群时使用；必须包含本节点 node_id。
initial_members = [1]
#initial_members = [1, 2, 3]

[[cluster.peers]]
# 集群节点 ID。
id = 1
# 该节点内部 gRPC/Raft 地址；distributed 下本节点 peer addr 应与 listen_addr 匹配。
addr = "10.86.11.245:9830"

# distributed 三节点示例：
# [[cluster.peers]]
# id = 2
# addr = "10.86.11.245:9801"
# [[cluster.peers]]
# id = 3
# addr = "10.86.11.245:9802"


# ---- 节点角色 -------------------------------------------------------------

[roles]
# 是否启用 metadata 角色。
enable_metadata = true

# 是否启用 store 角色。
enable_store = true

# 是否启用 gateway 角色。distributed 当前要求 gateway 可用，以保持内部 RPC transport 可达。
enable_gateway = true


# ---- 默认图空间 -----------------------------------------------------------

[space]
# 默认 space 的 shard 数量；必须大于 0。
shard_count = 8

# 默认 space 的副本数。standalone 必须为 1；distributed 不得超过 peer 数量，建议使用奇数。
replication_factor = 1


# ---- Gateway --------------------------------------------------------------

[gateway]
# 是否启用 Cypher 查询入口。
enable_cypher = true


# ---- REST Gateway ---------------------------------------------------------

[rest]
# 是否启用官方 HTTP JSON REST API。默认关闭，避免改变现有部署暴露面。
enabled = false

# REST public API 监听地址；enabled = true 时必须非空。
public_listen_addr = "127.0.0.1:8080"

# 兼容保留字段：REST public/admin 路由已合并到 public_listen_addr，本字段不再创建独立 listener。
# admin_listen_addr = "127.0.0.1:8081"

# 单个 REST 请求超时时间，单位：秒。
request_timeout_secs = 120

# 单个 REST JSON 请求体大小上限，单位：字节。
max_body_bytes = 10485760

# 可选 CORS origin 白名单；为空表示不注入 CORS 层。
cors_origins = []


# ---- Metadata -------------------------------------------------------------

[metadata]
# 元数据校验策略。枚举值：strict、non_strict。
mode = "non_strict"

# 是否在访问不存在的 graph routing 时自动创建。仅建议开发/演示环境使用；生产建议 false。
auto_create_graph_routing = false

[metadata.propose]
# standalone metadata KV log 每应用多少条命令后触发压紧提示；必须大于 0。
compaction_threshold = 1000

# metadata propose 或转发给 leader 的总等待时间，单位：毫秒；必须大于 0。
propose_max_wait_ms = 15000

# metadata propose 重试退避间隔，单位：毫秒；必须大于 0。
propose_retry_backoff_ms = 100

# 远端 forward 成功后等待本地状态机应用到目标版本的最长时间，单位：毫秒；必须大于 0。
local_apply_max_wait_ms = 5000

# 等待本地状态机应用版本时的轮询间隔，单位：毫秒；必须大于 0。
local_apply_poll_ms = 20


# ---- gRPC ---------------------------------------------------------------

[grpc]
# distributed 且同一节点同时启用 store 和 gateway 时，外部 gRPC 地址需要与 listen_addr 分离。
# 该外部 listener 同时承载 public 与 admin/operator gRPC service。
# standalone 可省略，默认使用顶层 listen_addr。
# public_listen_addr = "127.0.0.1:15001"

# 兼容保留字段：admin/operator gRPC 已合并到 public_listen_addr，本字段不再创建独立 listener。
# admin_listen_addr = "127.0.0.1:15001"

# 是否启用 gRPC TLS。
secure = false

# gRPC TLS 服务端证书 PEM 路径；secure = true 时必须配置。
# tls_cert_file = "./data/certs/server.crt"

# gRPC TLS 服务端私钥 PEM 路径；secure = true 时必须配置。
# tls_key_file = "./data/certs/server.key"

# gRPC mTLS 客户端 CA PEM 路径；为空表示不要求客户端证书。
# tls_client_ca_file = "./data/certs/client-ca.crt"

# 最大 TCP 连接数；0 表示不限制。
max_connections = 2048

# 每个 HTTP/2 连接允许的最大并发 stream 数。
max_concurrent_streams = 256

# 每个连接的并发请求限制；必须大于 0。
concurrency_limit_per_connection = 1024

# 单个 gRPC 请求超时时间，单位：秒。
request_timeout_secs = 660

# TCP keepalive 周期，单位：秒。
tcp_keepalive_secs = 60

# HTTP/2 keepalive ping 周期，单位：秒。
http2_keepalive_interval_secs = 20

# HTTP/2 keepalive ping 超时，单位：秒。
http2_keepalive_timeout_secs = 5

# 最大连接生命周期，单位：秒；0 表示禁用。
max_connection_age_secs = 0

# 服务端 streaming RPC 缓冲容量，单位：消息数。
stream_buffer = 128


# ---- Bolt ----------------------------------------------------------------

[bolt]
# Bolt 协议监听地址。
listen_addr = "0.0.0.0:7690"

# 是否启用 Bolt 服务。
enabled = true

# 是否启用 Bolt TLS。false 使用明文 bolt://；true 使用 TLS。
secure = false

# 返回给 Bolt ROUTE/驱动侧使用的地址；省略时使用 listen_addr。
# by AI: 典型场景：容器/K8s 环境、NAT/代理后面时，listen 绑定内网地址但 advertise 对外暴露公网地址。省略时默认使用 listen_addr
# advertise_address = "10.86.11.245:7687"

# Bolt TLS 服务端证书 PEM 路径；secure = true 时必须配置。
# tls_cert_file = "./data/certs/server.crt"

# Bolt TLS 服务端私钥 PEM 路径；secure = true 时必须配置。
# tls_key_file = "./data/certs/server.key"

# Bolt mTLS 客户端 CA PEM 路径；为空表示不要求客户端证书。
# tls_client_ca_file = "./data/certs/client-ca.crt"

# 最大 Bolt 会话数；必须大于 0。
max_sessions = 8192

# 空闲会话断开时间，单位：秒；0 表示 accept 层不主动断开。
idle_timeout_secs = 0

# Bolt 握手超时，单位：毫秒。
handshake_timeout_ms = 30000

# TCP listen backlog；必须大于 0。
accept_backlog = 1024

# 停止 accept 后等待 Bolt 会话退出的时间，单位：秒；必须大于 0。
shutdown_drain_secs = 5

# TCP keepalive 周期，单位：秒。
tcp_keepalive_secs = 60

# 是否禁用 Nagle 算法；交互式 Bolt 建议 true。
tcp_nodelay = true


# ---- Raft ----------------------------------------------------------------

[raft]
# Raft tick 间隔，单位：毫秒。standalone 下通常忽略。
tick_interval_ms = 100

# Raft 日志目录。fold_meta_raft_log = true 时必须配置非空 log_dir。
log_dir = "./log/raft-log"

# Raft 选举 tick。distributed 默认未覆盖时运行时会使用 30；standalone 默认 10。
election_tick = 10

# Raft 心跳 tick；distributed 下必须小于 election_tick。
heartbeat_tick = 3

# 单条 Raft message 最大大小，单位：字节。
max_size_per_msg = 1048576

# Raft inflight message 上限。
max_inflight_msgs = 256

# 每个 Raft group 应用多少条日志后触发 snapshot。
snapshot_interval = 10000

# 是否将 Meta 组 Raft 日志写入集中目录 [raft].log_dir；仅 distributed 新建集群建议开启。
fold_meta_raft_log = false

[raft.driver]
# leader 线性读是否跳过 ReadIndex 直接读本地状态机。默认 false，更安全。
leader_linearizable_fast_path = false

# store router 是否使用 ReadIndex 支撑线性一致读。
linearizable_store_reads = true

# 等待 ReadIndex 返回 commit index 的最长时间，单位：毫秒。
read_index_wait_ms = 10000

# 等待状态机应用到 ReadIndex 的最长时间，单位：毫秒。
read_index_apply_wait_ms = 10000

# 等待状态机应用时的轮询间隔，单位：毫秒。
read_index_poll_ms = 5

# propose_and_wait 超时时间，单位：毫秒。
propose_timeout_ms = 30000

# propose_conf_change_and_wait 超时时间，单位：毫秒。
conf_change_timeout_ms = 30000

# 集群 seed 阶段等待本地 gRPC ready 的最长时间，单位：毫秒。
startup_grpc_ready_timeout_ms = 30000

# 集群 seed 阶段等待 Meta leader 的最长时间，单位：毫秒。
startup_meta_leader_timeout_ms = 30000

# 集群 seed 等待过程轮询间隔，单位：毫秒。
startup_poll_interval_ms = 100

[raft.transport]
# 是否压缩大的 Raft protobuf message。
compress_large_messages = false

# Raft transport 单帧最大字节数。
max_frame_bytes = 16777216

# Raft transport 单消息最大字节数。
max_message_bytes = 67108864

# Raft transport 最大 inflight 请求数；必须大于 0。
max_inflight = 256

# Raft transport 连接超时，单位：毫秒。
connect_timeout_ms = 5000

# Raft transport 单 RPC 超时，单位：毫秒。
request_timeout_ms = 30000

# Raft transport 连接失败最大重试次数。
max_connect_retries = 20

# 首次连接失败后的退避时间，单位：毫秒。
initial_backoff_ms = 50

# 指数退避上限，单位：毫秒。
max_backoff_ms = 2000

[raft.fast_ack]
# 是否启用 quorum ack 早于同步状态机 apply 的实验路径。默认关闭。
enabled = false

# 是否在 fast_ack 开启时异步执行 data shard 状态机 apply；要求 enabled = true。
async_sm_apply = false

# 异步状态机 apply 队列上限；最小按 1 生效。
async_sm_apply_max_pending = 1024


# ---- RaftEngine -----------------------------------------------------------

[raft_engine]
# RaftEngine 近似 group commit 的 bytes_per_sync；不设置表示使用后端默认。
# bytes_per_sync = 1048576


# ---- 存储 ----------------------------------------------------------------

[storage]
# 覆盖顶层 data_dir；不配置时使用顶层 data_dir。
# data_dir = "./data"

# 覆盖顶层 engine。枚举值：memory、rocksdb。
# engine = "rocksdb"

# 通用缓存容量，单位：字节。
cache_capacity_bytes = 67108864

# 图缓存去重 TTL，单位：秒；必须大于 0。
dedup_ttl_secs = 300

# 单个点或边允许的属性数量软上限；默认 128，不得超过硬上限 512。
max_props_per_element = 128

[storage.gc]
# MVCC GC 执行间隔，单位：秒；必须大于 0。
interval_secs = 300

# MVCC 历史版本保留逻辑时间窗口。
retention_ts = 10000

# 每轮 GC 最多处理的历史版本数；必须大于 0。
max_versions_per_pass = 4096

[storage.txn_recovery]
# 事务锁恢复扫描间隔，单位：秒；必须大于 0。
interval_secs = 5

# 针对 CommitUnknown/secondary finish 的快速扫描间隔，单位：秒；最小按 1 生效。
commit_unknown_interval_secs = 1

# 每轮最多处理的锁数量；必须大于 0。
max_locks_per_pass = 1024

# 待恢复事务积压阈值。
backlog_threshold = 10000

# 最老 pending 事务超过该逻辑年龄后 readiness 失败，单位：毫秒；最小按 1 生效。
oldest_pending_age_not_ready_ms = 300000

[storage.rocksdb]
# 单机批量提交持久化策略。枚举值：
# - "sync_each_batch" 或 "sync_each"：每批 fsync。
# - "wal_only"：不逐批 fsync，依赖 WAL 与 OS，吞吐更高但崩溃安全性更弱。
# - { group_commit_ms = N }：最多每 N 毫秒 fsync 一次。
commit_durability = "sync_each_batch"

# 是否开启 RocksDB pipelined write。
enable_pipelined_write = true

# 是否允许并发 memtable 写。
allow_concurrent_memtable_write = true

# 是否启用 write thread adaptive yield。
enable_write_thread_adaptive_yield = true

# 最大 subcompaction 数。
max_subcompactions = 4

# RocksDB 最大打开文件数；-1 表示不限制。
max_open_files = -1

# RocksDB 后台任务数；必须大于等于 1。
max_background_jobs = 4

# 进程级 write buffer 总预算，单位：字节。
total_write_buffer_bytes = 4294967296

# 进程级 block cache 总预算，单位：字节。
total_block_cache_bytes = 4294967296

# 是否对 RocksDB 写入使用同步写。
sync_writes = false

# WAL 每写入多少字节执行 sync；不设置表示 RocksDB 默认。
# wal_bytes_per_sync = 1048576

# 状态机纯 MVCC 批次是否关闭 WAL。standalone 必须保持 false；与 raft.fast_ack.enabled 不兼容。
sm_disable_wal = false

# Column family 可配置项说明：
# - compression 枚举值：none、snappy、lz4、zstd。
# - block_size 校验范围：[1024, 1048576]。
# - write_buffer_size 校验范围：[1048576, 2147483648]。
# - bloom_bits_per_key 校验范围：[0, 20]。
# - memtable_prefix_bloom_ratio 校验范围：[0, 1]。
# - disable_prefix_extractor = true 可显式关闭 prefix extractor。
# - disable_blob = true 可显式关闭 BlobDB。

[storage.rocksdb.data]
# data CF memtable 大小，单位：字节。
write_buffer_size = 67108864
# data CF memtable 数量上限。
max_write_buffer_number = 3
# data CF 压缩算法。枚举值：none、snappy、lz4、zstd。
compression = "lz4"
# data CF block 大小，单位：字节。
block_size = 16384
# data CF bloom filter bits per key。
bloom_bits_per_key = 10.0
# data CF 是否启用 whole key filtering。
whole_key_filtering = true
# data CF 是否缓存 index/filter blocks。
cache_index_and_filter_blocks = true
# data CF 是否 pin L0 filter/index blocks。
pin_l0_filter_and_index_blocks = true
# data CF 是否启用 partitioned filters。
partition_filters = true
# data CF 是否启用 two-level index。
two_level_index = true
# data CF prefix extractor 固定长度；不配置表示使用默认。
# prefix_extractor_len = 8
# data CF 是否显式关闭 prefix extractor。
disable_prefix_extractor = false
# data CF memtable prefix bloom ratio。
memtable_prefix_bloom_ratio = 0.1
# data CF 是否显式关闭 BlobDB。
disable_blob = false

[storage.rocksdb.data.blob]
# BlobDB 最小 blob 大小，单位：字节。
min_blob_size = 1024
# Blob 文件大小，单位：字节。
file_size = 268435456
# Blob 压缩算法。枚举值：none、snappy、lz4、zstd。
compression = "lz4"
# 是否启用 Blob GC。
enable_gc = true
# Blob GC age cutoff，范围 [0, 1]。
gc_age_cutoff = 0.25

[storage.rocksdb.entity]
# entity CF memtable 大小，单位：字节。
write_buffer_size = 33554432
# entity CF memtable 数量上限。
max_write_buffer_number = 3
# entity CF 压缩算法。枚举值：none、snappy、lz4、zstd。
compression = "lz4"
# entity CF block 大小，单位：字节。
block_size = 16384
# entity CF bloom filter bits per key。
bloom_bits_per_key = 10.0
# entity CF 是否启用 whole key filtering。
whole_key_filtering = true
# entity CF 是否缓存 index/filter blocks。
cache_index_and_filter_blocks = true
# entity CF 是否 pin L0 filter/index blocks。
pin_l0_filter_and_index_blocks = true
# entity CF 是否启用 partitioned filters。
partition_filters = true
# entity CF 是否启用 two-level index。
two_level_index = true
# entity CF prefix extractor 固定长度；不配置表示使用默认。
# prefix_extractor_len = 8
# entity CF 是否显式关闭 prefix extractor。
disable_prefix_extractor = false
# entity CF memtable prefix bloom ratio。
memtable_prefix_bloom_ratio = 0.0
# entity CF 是否显式关闭 BlobDB。
disable_blob = true

[storage.rocksdb.prop]
# prop CF memtable 大小，单位：字节。
write_buffer_size = 67108864
# prop CF memtable 数量上限。
max_write_buffer_number = 3
# prop CF 压缩算法。枚举值：none、snappy、lz4、zstd。
compression = "lz4"
# prop CF block 大小，单位：字节。
block_size = 16384
# prop CF bloom filter bits per key。
bloom_bits_per_key = 10.0
# prop CF 是否启用 whole key filtering。
whole_key_filtering = true
# prop CF 是否缓存 index/filter blocks。
cache_index_and_filter_blocks = true
# prop CF 是否 pin L0 filter/index blocks。
pin_l0_filter_and_index_blocks = true
# prop CF 是否启用 partitioned filters。
partition_filters = true
# prop CF 是否启用 two-level index。
two_level_index = true
# prop CF prefix extractor 固定长度；不配置表示使用默认。
# prefix_extractor_len = 8
# prop CF 是否显式关闭 prefix extractor。
disable_prefix_extractor = false
# prop CF memtable prefix bloom ratio。
memtable_prefix_bloom_ratio = 0.1
# prop CF 是否显式关闭 BlobDB。
disable_blob = false

[storage.rocksdb.prop.blob]
# BlobDB 最小 blob 大小，单位：字节。
min_blob_size = 1024
# Blob 文件大小，单位：字节。
file_size = 268435456
# Blob 压缩算法。枚举值：none、snappy、lz4、zstd。
compression = "lz4"
# 是否启用 Blob GC。
enable_gc = true
# Blob GC age cutoff，范围 [0, 1]。
gc_age_cutoff = 0.25

[storage.rocksdb.adj]
# adj CF memtable 大小，单位：字节。
write_buffer_size = 33554432
# adj CF memtable 数量上限。
max_write_buffer_number = 3
# adj CF 压缩算法。枚举值：none、snappy、lz4、zstd。
compression = "lz4"
# adj CF block 大小，单位：字节。
block_size = 8192
# adj CF bloom filter bits per key。
bloom_bits_per_key = 10.0
# adj CF 是否启用 whole key filtering。
whole_key_filtering = false
# adj CF 是否缓存 index/filter blocks。
cache_index_and_filter_blocks = true
# adj CF 是否 pin L0 filter/index blocks。
pin_l0_filter_and_index_blocks = true
# adj CF 是否启用 partitioned filters。
partition_filters = true
# adj CF 是否启用 two-level index。
two_level_index = true
# adj CF prefix extractor 固定长度；不配置表示使用默认。
# prefix_extractor_len = 8
# adj CF 是否显式关闭 prefix extractor。
disable_prefix_extractor = false
# adj CF memtable prefix bloom ratio。
memtable_prefix_bloom_ratio = 0.1
# adj CF 是否显式关闭 BlobDB。
disable_blob = true

[storage.rocksdb.counter]
# counter CF memtable 大小，单位：字节。
write_buffer_size = 8388608
# counter CF memtable 数量上限。
max_write_buffer_number = 3
