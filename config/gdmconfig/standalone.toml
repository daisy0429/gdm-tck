# ---- Resource Pool --------------------------------------------------------

[resource_pool.global]
# 跨资源池内存软上限，单位：字节；0 或不配置表示继承默认值。
total_memory_bytes = 8589934592

[resource_pool.query]
# query 池最大并发数；必须大于 0。
max_concurrency = 128
# query 池内存预算，单位：字节。
memory_bytes = 4294967296
# query 单任务最大内存，单位：字节；不得超过 memory_bytes。
max_memory_per_task = 536870912
# query 默认超时，单位：毫秒；0 表示不限制。
default_timeout_ms = 600000
# query 限流 QPS；0 表示禁用限流。
rate_limit_rps = 2000
# query 等待队列上限。
max_waiters = 1024

[resource_pool.system]
# system 池最大并发数；必须大于 0。
max_concurrency = 8
# system 池内存预算，单位：字节。
memory_bytes = 2147483648
# system 单任务最大内存，单位：字节；不得超过 memory_bytes。
max_memory_per_task = 1073741824
# system 默认超时，单位：毫秒；0 表示不限制。
default_timeout_ms = 0
# system 限流 QPS；0 表示禁用限流。
rate_limit_rps = 0
# system 等待队列上限。
max_waiters = 128

[resource_pool.maintenance]
# maintenance 池最大并发数；必须大于 0。
max_concurrency = 2
# maintenance 池内存预算，单位：字节。
memory_bytes = 536870912
# maintenance 单任务最大内存，单位：字节；不得超过 memory_bytes。
max_memory_per_task = 268435456
# maintenance 默认超时，单位：毫秒；0 表示不限制。
default_timeout_ms = 0
# maintenance 限流 QPS；0 表示禁用限流。
rate_limit_rps = 0
# maintenance 等待队列上限。
max_waiters = 32

[resource_pool.admin]
# admin 池最大并发数；必须大于 0。
max_concurrency = 16
# admin 池内存预算，单位：字节。
memory_bytes = 268435456
# admin 单任务最大内存，单位：字节；不得超过 memory_bytes。
max_memory_per_task = 67108864
# admin 默认超时，单位：毫秒；0 表示不限制。
default_timeout_ms = 10000
# admin 限流 QPS；0 表示禁用限流。
rate_limit_rps = 0
# admin 等待队列上限。
max_waiters = 256


# ---- Scheduler ------------------------------------------------------------

[scheduler]
# 是否启用 scheduler-v1 gRPC 和 JobCoordinator 调度路径。
scheduler_v1 = true

# 调度 coordinator 轮询间隔，单位：毫秒。
tick_ms = 500


# ---- Query ----------------------------------------------------------------

[query]
# 变长路径 `-[*..]` 每个起点最多展开的路径数。
varlen_max_paths_per_start = 10000

# 存储扫描默认分页大小，单位：行。
scan_page_size = 1024

[query.shortest_path]
# shortestPath/allShortestPaths BFS 最多访问的不同顶点数。
max_visited = 50000

# shortestPath/allShortestPaths BFS 单个顶点最多扫描的邻居数。
max_fanout_per_vertex = 5000

[query.plan_cache]
# 是否启用 L2 查询计划缓存。
enabled = true

# 查询计划缓存最大条目数；必须大于 0。
max_entries = 4096


# ---- Observability --------------------------------------------------------

[observability]
# 日志格式。枚举值：json、plain。
log_format = "json"

# 默认日志级别。常用值：trace、debug、info、warn、error。
default_level = "info"

# metrics/健康检查 HTTP 地址；空字符串表示禁用 metrics server。
metrics_addr = "10.86.11.245:9095"

# 是否启用分布式 tracing/OTLP 导出。
tracing_enabled = false

# OTLP gRPC endpoint。
otlp_endpoint = "http://127.0.0.1:4317"

# trace service.name。
service_name = "gdm"

# trace service.namespace。
service_namespace = "graphdb"

# trace 采样率，范围 [0, 1]。
trace_sample_ratio = 0.01

# trace export 超时，单位：毫秒；最小按 1 生效。
trace_export_timeout_ms = 3000

# 是否在内部 RPC 之间传播 trace context。
propagate_internal = true

[observability.filters]
# 模块级日志过滤。key 是 tracing target，value 是日志级别。
# 常用 target：raft、gdm_distributed、gdm_grpc_server、gdm_store、gdm_metadata。
# raft = "warn"
# gdm_grpc_server = "debug"

[observability.console]
# 是否输出控制台日志。
enabled = true

# 控制台日志级别；不配置时继承 observability.default_level。
# level = "info"

[observability.file]
# 是否启用文件日志。
enabled = true

# 文件日志目录。应用日志
dir = "./logs"

# 文件日志名前缀。
prefix = "gdm"

# 日志轮转策略。枚举值：daily、hourly、never。
rotation = "daily"

# 最多保留多少个日志文件；0 表示不限制。
max_files = 7

# 文件日志级别；不配置时继承 observability.default_level。
# level = "info"

# 文件日志格式。枚举值：json、plain；不配置时继承 observability.log_format。
# format = "plain"

[observability.trace_resource_attrs]
# 额外 trace resource attributes。
# deployment = "dev"
# region = "local"


# ---- UDF ------------------------------------------------------------------

[udf]
# 是否启用 UDF 执行。默认关闭，避免新部署意外暴露脚本执行能力。
enabled = false

# 启动时扫描的 UDF 包目录；为空表示不做声明式加载。
 ext_function_dir = "./udf"

# UDF 目录与 catalog 的对齐策略。枚举值：overwrite、preserve。
policy = "overwrite"

# 单个 UDF 文件加载失败时的行为。枚举值：continue、fail。
on_error = "continue"

# UDF 加载排除规则，shell glob，匹配相对 ext_function_dir 的路径。
exclude = []

# 默认每次 UDF 调用 CPU 预算，单位：毫秒；不配置使用运行时内置默认。
# default_cpu_ms = 100

# 默认每次 UDF 调用内存上限，单位：字节；不配置使用运行时内置默认。
# default_memory_bytes = 67108864


# ---- Security -------------------------------------------------------------

[security.credentials]
# 密码材料存储位置。枚举值：inline、system_graph。
# 兼容别名：system-graph、systemgraph。
storage = "inline"

[security.password]
# Argon2id 内存成本，单位：KiB；必须 >= 8。
m_cost_kib = 19456

# Argon2id 迭代次数；必须 >= 1。
t_cost = 2

# Argon2id 并行度；必须 >= 1。
p_cost = 1

# Argon2id 输出长度，单位：字节；范围 [16, 64]。
output_len = 32

[security.audit]
# 是否启用审计。
enabled = true

# 审计 JSONL 文件路径；不配置时只保留内存 ring。
path = "/ssd/workspace/010/standalone/gdm-v0.1.0.preview-linux-amd64-2.17/audit/audit.jsonl"

# 内存审计 ring 容量；必须大于 0。
ring_cap = 256

# 是否启用内存 ring。
ring_enabled = true

# JSONL writer 每多少条刷盘；0 表示不按条数刷盘。
flush_every_entries = 64

# JSONL writer 至少多久刷盘一次，单位：毫秒；0 表示禁用定时刷盘。
flush_interval_ms = 1000

# 审计文件轮转策略。枚举值：never、daily；兼容别名：off、none、day。
rotation = "daily"

# daily 轮转时最多保留多少个文件；0 表示不限制。
max_files = 0

# allow 决策采样率，范围 [0, 1]；deny 不会被采样丢弃。
sample_allow = 1.0

# 每秒最多记录多少条 allow 审计；0 表示不限制；deny 不受此限制。
max_per_sec = 0

# shutdown cancel 后最多等待多久 drain 审计队列，单位：秒；必须大于 0。
flush_drain_secs = 2

[security.providers]
# 对外声明/启用的认证 scheme。枚举值：basic、scram-sha-256。
# 当前 NativeAuthProvider 要求包含 basic。
schemes = ["basic"]

# 是否启用 LDAP provider。
ldap_enabled = false

# 是否启用 OIDC provider。
oidc_enabled = false

[security.bootstrap]
# 初始 admin 是否要求首次登录后修改密码。
password_change_required = false

[security.sessions]
# gRPC / REST Bearer token session 登录；默认关闭以避免改变现有暴露面。
enabled = false

# Access token TTL，单位：秒；启用 sessions 时必须大于 0。
access_token_ttl_secs = 900

# Refresh token TTL，单位：秒；启用 sessions 时必须大于 access_token_ttl_secs。
refresh_token_ttl_secs = 604800

# 单个用户在当前 gateway 内最多保留的 session 数。
max_sessions_per_user = 32

# session 过期清理间隔，单位：秒。
gc_interval_secs = 60

# 登录失败限流窗口，单位：秒；预留给 gateway 本地防爆破策略。
login_fail_window_secs = 60

# 登录失败限流阈值；预留给 gateway 本地防爆破策略。
login_fail_limit = 20


# ---- Node Liveness / Seed Backoff ----------------------------------------

[node_liveness]
# 节点向 metadata 上报心跳的周期，单位：毫秒；必须大于 0。
heartbeat_interval_ms = 5000

# metadata 判定节点失联的超时时间，单位：毫秒；必须大于 heartbeat_interval_ms。
heartbeat_timeout_ms = 30000

[seed_backoff]
# distributed seed 失败后的初始退避，单位：毫秒；distributed 下必须大于 0。
initial_backoff_ms = 200

# distributed seed 指数退避上限，单位：毫秒；distributed 下必须大于 0。
max_backoff_ms = 30000

# distributed seed 指数退避倍率；distributed 下必须是有限值且 > 1.0。
multiplier = 1.501

# seed 阶段等待本地 gRPC ready 的最长时间，单位：毫秒；distributed 下必须大于 0。
grpc_ready_timeout_ms = 30000

# seed 阶段等待本地 gRPC ready 的轮询间隔，单位：毫秒；distributed 下必须大于 0。
grpc_ready_poll_ms = 100

# seed 阶段等待 Meta leader 的最长时间，单位：毫秒；distributed 下必须大于 0。
meta_leader_wait_timeout_ms = 30000

# bootstrap 后 shard group reconcile 周期，单位：毫秒；distributed 下必须大于 0。
shard_reconcile_interval_ms = 10000


# ---- Transaction / Index / TSO -------------------------------------------

[txn]
# BeginTxn 未传 timeout_ms 时使用的默认事务 TTL，单位：毫秒；必须大于 0。
default_begin_timeout_ms = 60000

[index.fulltext]
# 全文索引 IndexWriter heap 预算，单位：字节。
writer_heap_bytes = 50000000

[index.vector]
# 向量 derived view 根目录；相对路径基于 data_dir。
root_dir = "derived/vector"
# 后台 flush 周期，单位：毫秒。
flush_interval_ms = 1000
# 每轮 flush 处理的 journal entry 数。
batch_size = 1024
# DDL 未指定 ef_search 时使用的默认值。
default_ef_search = 128
# 查询 k 上限。
max_k = 1000
# 向量维度上限。
max_dimensions = 16384
# 单次查询超时，单位：毫秒。
query_timeout_ms = 5000
# 并发构建/回填 worker 数。
build_concurrency = 2
# 向量索引软内存预算，单位：字节。 默认1G
memory_budget_bytes = 1073741824

[tso]
# TSO 从 metadata 批量申请 timestamp 的批大小。
batch_size = 50000
