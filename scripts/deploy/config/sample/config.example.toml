# =============================================================================
# [observability]
# =============================================================================

[observability]

# 日志格式。枚举：json | plain
log_format = "json"

# 默认日志级别（RUST_LOG 风格过滤器由 observability 段扩展）。
default_level = "info"

# 是否输出到 stderr。
console_enabled = true

# 控制台级别；省略时与 default_level 一致。
# console_level = "info"

# 是否在日志行/JSON 中输出 tracing target（默认 false，避免暴露 crate 模块路径）。
# show_target = false

# --- [observability.filters] 生产推荐 per-target 级别（复制到正式配置；RUST_LOG 可覆盖）---
# [observability.filters]
# "gdm::raft::internal" = "warn"
# "gdm::raft" = "info"
# "gdm::raft::transport" = "info"
# "gdm::raft::forwarder" = "warn"
# "gdm::metadata::log" = "info"
# "gdm::metadata::bootstrap" = "info"
# "gdm::bootstrap::seed" = "info"
# "gdm::lifecycle" = "info"
# "gdm::shutdown" = "info"
# "gdm::grpc::internal" = "warn"
# "raft" = "warn"

# --- [observability.trace] OpenTelemetry（默认见注释）---
# [observability.trace]
# tracing_enabled = false
# otlp_endpoint = "http://127.0.0.1:4317"
# service_name = "gdm"
# service_namespace = "graphdb"
# trace_sample_ratio = 0.01
# trace_export_timeout_ms = 3000
# propagate_internal = true

# --- [observability.file] 文件日志（默认见注释）---
# [observability.file]
# enabled = false
# dir = "./logs"
# prefix = "gdm"
# rotation = "daily"                    # 枚举：daily | hourly | ...（以代码为准）
# max_files = 7

# [observability.trace_resource_attrs]
# "deployment.environment" = "dev"
