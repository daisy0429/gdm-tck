# =============================================================================
# [security]
# =============================================================================

# --- [security] 认证与凭据（默认见注释）---
# [security]
# bootstrap_password_change_required = false
# credentials_storage = "inline"        # 枚举：inline | system_graph（以代码为准）

# [security.password]
# m_cost_kib = 19456
# t_cost = 2
# p_cost = 1
# output_len = 32

# [security.audit]
