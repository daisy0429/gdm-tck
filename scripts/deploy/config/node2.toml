disable_blob = true


# ---- Resource Pool --------------------------------------------------------

[resource_pool.global]
total_memory_bytes = 8589934592

[resource_pool.query]
max_concurrency = 128
memory_bytes = 4294967296
max_memory_per_task = 536870912
default_timeout_ms = 600000
rate_limit_rps = 2000
max_waiters = 1024

[resource_pool.system]
max_concurrency = 8
memory_bytes = 2147483648
max_memory_per_task = 1073741824
default_timeout_ms = 0
rate_limit_rps = 0
max_waiters = 128

[resource_pool.maintenance]
max_concurrency = 2
memory_bytes = 536870912
max_memory_per_task = 268435456
default_timeout_ms = 0
rate_limit_rps = 0
max_waiters = 32

[resource_pool.admin]
max_concurrency = 16
memory_bytes = 268435456
max_memory_per_task = 67108864
default_timeout_ms = 10000
rate_limit_rps = 0
max_waiters = 256


# ---- Scheduler ------------------------------------------------------------

[scheduler]
scheduler_v1 = true
tick_ms = 500


# ---- Query ----------------------------------------------------------------

[query]
varlen_max_paths_per_start = 10000
scan_page_size = 1024

[query.shortest_path]
max_visited = 50000
max_fanout_per_vertex = 5000

[query.plan_cache]
enabled = true
max_entries = 4096


# ---- Observability --------------------------------------------------------

[observability]
log_format = "json"
default_level = "info"
# todo for cluster: 节点 2 metrics 端口 9091
metrics_addr = "10.86.11.245:9091"

tracing_enabled = false
otlp_endpoint = "http://127.0.0.1:4317"
service_name = "gdm-node2"
service_namespace = "graphdb"
trace_sample_ratio = 0.01
trace_export_timeout_ms = 3000
propagate_internal = true

[observability.filters]
raft = "warn"

[observability.console]
enabled = true

[observability.file]
enabled = true
# todo for cluster: 节点 2 独立日志目录
#dir = "/data/workspace/010/cluster/node2/logs"
dir = "./logs"

prefix = "gdm-node2"
rotation = "daily"
max_files = 14

[observability.trace_resource_attrs]
deployment = "prod"
region = "cluster-node2"


# ---- UDF ------------------------------------------------------------------

[udf]
enabled = false
policy = "overwrite"
on_error = "continue"
exclude = []


# ---- Security ---------------------------------------------------------

[security.credentials]
storage = "system_graph"

[security.password]
m_cost_kib = 19456
t_cost = 2
p_cost = 1
output_len = 32

[security.audit]
enabled = true
# todo for cluster: 节点 2 独立审计落盘路径
#path = "/data/workspace/010/cluster/node2/data/audit.jsonl"
path = "./audit/audit.jsonl"

ring_cap = 256
ring_enabled = true
flush_every_entries = 64
flush_interval_ms = 1000
rotation = "daily"
max_files = 30
sample_allow = 1.0
max_per_sec = 0
flush_drain_secs = 2

[security.providers]
schemes = ["basic"]
ldap_enabled = false
oidc_enabled = false

[security.bootstrap]
password_change_required = false


# ---- Node Liveness / Seed Backoff -----------------------------------------

[node_liveness]
heartbeat_interval_ms = 5000
heartbeat_timeout_ms = 30000

[seed_backoff]
initial_backoff_ms = 200
max_backoff_ms = 30000
multiplier = 1.501
grpc_ready_timeout_ms = 30000
grpc_ready_poll_ms = 100
meta_leader_wait_timeout_ms = 30000
shard_reconcile_interval_ms = 10000


# ---- Transaction / Index / TSO -------------------------------------------

[txn]
default_begin_timeout_ms = 60000

[index.fulltext]
writer_heap_bytes = 50000000

[tso]
batch_size = 50000